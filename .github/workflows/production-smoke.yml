name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: URL publica para validar
        required: true
        default: https://dvais-mentor-ia.vercel.app

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke
        run: npx tsx scripts/check_assistant.ts "${{ github.event.inputs.base_url }}"
